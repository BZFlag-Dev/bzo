name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and validate
        run: npm run check
